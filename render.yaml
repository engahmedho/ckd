services:
  - type: web
    name: ckd-predictor
    env: node
    buildCommand: npm install && pip install -r requirements.txt && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: ckd-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: ckd-db
    databaseName: ckd_predictor
    user: ckd_user
